# Entorno de desarrollo local de Proxi.
# Levanta PostgreSQL 16 y Redis 7 con volúmenes persistentes.
#
# Uso:
#   docker compose -f infra/docker/docker-compose.yml up -d
#
# Variables tomadas de infra/docker/.env (ver .env.example).

services:
  postgres:
    image: postgres:16-alpine
    container_name: proxi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proxi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proxi}
      POSTGRES_DB: ${POSTGRES_DB:-proxi}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - proxi-postgres-data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-proxi}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proxi-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - proxi-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  proxi-postgres-data:
    driver: local
  proxi-redis-data:
    driver: local
